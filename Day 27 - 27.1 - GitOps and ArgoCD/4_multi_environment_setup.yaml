# ══════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT COMPARISON TABLE
# ══════════════════════════════════════════════════════════════════════════════

# ┌────────────────┬──────────┬──────────┬──────────────┐
# │ Configuration  │ Dev      │ Staging  │ Production   │
# ├────────────────┼──────────┼──────────┼──────────────┤
# │ Replicas       │ 1        │ 3        │ 10           │
# │ CPU Request    │ 50m      │ 100m     │ 500m         │
# │ Memory Request │ 64Mi     │ 128Mi    │ 1Gi          │
# │ Image Tag      │ dev-xxx  │ staging  │ v1.0.0       │
# │ Domain         │ dev.app  │ stg.app  │ app.com      │
# │ Sync Mode      │ Auto     │ Auto     │ Manual       │
# │ Self-Heal      │ Yes      │ Yes      │ Yes          │
# │ Sync Window    │ Always   │ Always   │ 10AM-12PM    │
# │ Branch/Tag     │ main     │ main     │ release-v1.0 │
# └────────────────┴──────────┴──────────┴──────────────┘

# ══════════════════════════════════════════════════════════════════════════════
# PROMOTION WORKFLOW
# ══════════════════════════════════════════════════════════════════════════════

# Standard promotion workflow:
#
# 1. DEVELOPMENT:
#    - Developer commits code
#    - CI builds image: myorg/my-app:dev-abc123
#    - Update overlays/dev/kustomization.yaml with new tag
#    - ArgoCD auto-syncs to dev environment
#    - Developer tests in dev
#
# 2. STAGING:
#    - Tests pass in dev
#    - Update overlays/staging/kustomization.yaml with same tag
#    - ArgoCD auto-syncs to staging
#    - QA team tests in staging
#
# 3. PRODUCTION:
#    - Tests pass in staging
#    - Tag the image: myorg/my-app:v1.0.0
#    - Update overlays/prod/kustomization.yaml with v1.0.0
#    - Create PR for production deployment
#    - After approval, merge PR
#    - ArgoCD syncs to production (manual or scheduled)

# Example Git workflow:
# ─────────────────────────────────────────────────────────────────────────────
#
# git checkout -b feature/new-feature
# # Make changes to base/ or overlays/
# git commit -m "feat: add new feature"
# git push origin feature/new-feature
#
# # PR to main → affects dev and staging
# # After testing, create PR to release branch
# git checkout -b release-v1.1
# git push origin release-v1.1
#
# # Update production to use release-v1.1 branch

# ══════════════════════════════════════════════════════════════════════════════
# USAGE INSTRUCTIONS
# ══════════════════════════════════════════════════════════════════════════════

# 1. Create your Git repository with the structure shown above

# 2. Apply all three ArgoCD applications:
#    kubectl apply -f 4_multi_environment_setup.yaml

# 3. Verify all applications are created:
#    argocd app list

# 4. Sync each environment:
#    argocd app sync my-app-dev
#    argocd app sync my-app-staging
#    argocd app sync my-app-prod

# 5. View all environments in UI:
#    Open ArgoCD UI and see all three apps
#    Each shows its own namespace, resources, and sync status

# 6. Make a change and promote:
#    # Update dev
#    edit overlays/dev/replicas-patch.yaml
#    git commit -am "scale dev to 2 replicas"
#    git push
#    # Dev syncs automatically
#
#    # After testing, promote to staging
#    edit overlays/staging/replicas-patch.yaml
#    git commit -am "scale staging to 5 replicas"
#    git push
#    # Staging syncs automatically
#
#    # After approval, promote to prod
#    edit overlays/prod/replicas-patch.yaml
#    git commit -am "scale prod to 15 replicas"
#    # Create PR, get approval, merge
#    # Manually sync or wait for sync window

# ══════════════════════════════════════════════════════════════════════════════
# ADVANCED: USING ARGOCD APP OF APPS PATTERN
# ══════════════════════════════════════════════════════════════════════════════

# Instead of applying each application separately, use "App of Apps" pattern:
#
# apiVersion: argoproj.io/v1alpha1
# kind: Application
# metadata:
#   name: my-app-environments
#   namespace: argocd
# spec:
#   project: default
#   source:
#     repoURL: https://github.com/myorg/my-app-gitops.git
#     targetRevision: main
#     path: argocd-apps  # Directory containing all app manifests
#   destination:
#     server: https://kubernetes.default.svc
#     namespace: argocd
#   syncPolicy:
#     automated:
#       prune: true
#       selfHeal: true
#
# This single "parent" app manages all environment applications!

/*
KEY CONCEPTS:
- MULTI-ENVIRONMENT = Managing dev, staging, prod from single repo
- KUSTOMIZE = Tool for customizing Kubernetes manifests (overlays)
- BASE = Shared configuration used by all environments
- OVERLAY = Environment-specific customizations
- PATCH = YAML snippet that modifies base configuration
- PROMOTION = Moving code/config from dev → staging → prod
- SYNC WINDOW = Time restrictions for when syncs can occur
- APP OF APPS = Pattern where one app manages multiple apps
- DRY (DON'T REPEAT YOURSELF) = Share common config, customize only differences
- TARGET REVISION = Git branch, tag, or commit to deploy from
*/
