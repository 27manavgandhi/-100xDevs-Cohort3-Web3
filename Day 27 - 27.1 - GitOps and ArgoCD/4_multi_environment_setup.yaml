# Topic: Multi-Environment GitOps with Kustomize and ArgoCD
# Day 27.1 - GitOps and ArgoCD
#
# To use: kubectl apply -f 4_multi_environment_setup.yaml

# ── What is Multi-Environment Setup? ──────────────────────────────────────────
#
# Multi-environment setup means managing different environments (dev, staging, prod)
# with shared base configurations but environment-specific customizations.
#
# Real-Life Analogy:
#   Like a restaurant chain. Each location (environment) shares the same menu
#   (base configuration) but customizes portions, prices, and decorations
#   (overlays) based on local preferences.
#
# Why use multi-environment setup?
#   1. DRY PRINCIPLE: Don't repeat base configurations
#   2. CONSISTENCY: Same core configs across all environments
#   3. ENVIRONMENT-SPECIFIC: Customize replicas, resources, domains per env
#   4. EASY PROMOTION: Test in dev, promote to staging, then prod
#   5. SINGLE REPOSITORY: Manage all environments from one repo

# ══════════════════════════════════════════════════════════════════════════════
# DIRECTORY STRUCTURE (Kustomize-based)
# ══════════════════════════════════════════════════════════════════════════════

# my-app-gitops/
# ├── base/                          # Shared base configuration
# │   ├── kustomization.yaml         # Base kustomization file
# │   ├── deployment.yaml            # Base deployment (2 replicas)
# │   ├── service.yaml               # Base service
# │   └── namespace.yaml             # Base namespace
# └── overlays/                      # Environment-specific customizations
#     ├── dev/
#     │   ├── kustomization.yaml     # Dev customizations
#     │   ├── replicas-patch.yaml    # 1 replica for dev
#     │   └── resources-patch.yaml   # Small resources for dev
#     ├── staging/
#     │   ├── kustomization.yaml     # Staging customizations
#     │   ├── replicas-patch.yaml    # 3 replicas for staging
#     │   └── resources-patch.yaml   # Medium resources
#     └── prod/
#         ├── kustomization.yaml     # Production customizations
#         ├── replicas-patch.yaml    # 10 replicas for production
#         ├── resources-patch.yaml   # Large resources
#         └── ingress-patch.yaml     # Production domain

# ══════════════════════════════════════════════════════════════════════════════
# ARGOCD APPLICATION FOR DEVELOPMENT ENVIRONMENT
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-dev
  namespace: argocd
  labels:
    environment: dev
    app: my-app

spec:
  project: default

  # ── SOURCE (Dev Overlay) ────────────────────────────────────────────────────
  source:
    repoURL: https://github.com/myorg/my-app-gitops.git
    targetRevision: main
    # Point to dev overlay directory
    path: overlays/dev

  # ── DESTINATION (Dev Namespace) ─────────────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app-dev

  # ── SYNC POLICY (Automated for dev) ─────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---

# ══════════════════════════════════════════════════════════════════════════════
# ARGOCD APPLICATION FOR STAGING ENVIRONMENT
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-staging
  namespace: argocd
  labels:
    environment: staging
    app: my-app

spec:
  project: default

  # ── SOURCE (Staging Overlay) ────────────────────────────────────────────────
  source:
    repoURL: https://github.com/myorg/my-app-gitops.git
    targetRevision: main
    # Point to staging overlay directory
    path: overlays/staging

  # ── DESTINATION (Staging Namespace) ─────────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app-staging

  # ── SYNC POLICY (Automated for staging) ────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---

# ══════════════════════════════════════════════════════════════════════════════
# ARGOCD APPLICATION FOR PRODUCTION ENVIRONMENT
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-prod
  namespace: argocd
  labels:
    environment: production
    app: my-app

spec:
  project: default

  # ── SOURCE (Production Overlay) ─────────────────────────────────────────────
  source:
    repoURL: https://github.com/myorg/my-app-gitops.git
    # Use a stable tag or branch for production
    targetRevision: release-v1.0
    # Point to production overlay directory
    path: overlays/prod

  # ── DESTINATION (Production Namespace) ──────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: my-app-prod

  # ── SYNC POLICY (Manual for production - require approval) ─────────────────
  syncPolicy:
    # Manual sync for production (safety measure)
    # Could also use automated with sync windows for controlled deployment times
    syncOptions:
      - CreateNamespace=true
    
    # Optional: Sync windows to control when syncs can happen
    syncWindows:
    - kind: allow
      schedule: '0 10 * * *'  # Allow syncs at 10 AM daily
      duration: 2h
      applications:
      - my-app-prod

